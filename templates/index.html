<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Grok Video Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brandRow">
      <div class="dot"></div>
      <div class="title">Grok Video</div>
    </div>

    <div class="topActions">
      <div id="cooldownBadge" class="cooldownBadge" aria-hidden="true">Ready</div>
      <button id="topHistory" class="btn tiny ghost">History</button>
    </div>
  </header>

  <main class="container">
    <div id="view"></div>
  </main>



  <template id="tpl-generate">
    <section class="shell">
      <div class="leftCol">
        <div class="leftStack">
          <div class="panel compact">
            <div class="panelHead">
              <div class="label">Settings</div>
            </div>

            <details class="details" open>
              <summary class="summary">Video</summary>
              <div class="grid2">
                <div>
                  <label class="label">Duration (1–15s)</label>
                  <input id="duration" class="input" type="number" min="1" max="15" value="8" />
                </div>
                <div>
                  <label class="label">Aspect ratio</label>
                  <select id="aspect_ratio" class="select">
                    <option value="16:9" selected>16:9</option>
                    <option value="9:16">9:16</option>
                    <option value="1:1">1:1</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4">3:4</option>
                    <option value="3:2">3:2</option>
                    <option value="2:3">2:3</option>
                  </select>
                </div>
                <div>
                  <label class="label">Resolution</label>
                  <select id="resolution" class="select">
                    <option value="480p" selected>480p</option>
                    <option value="720p">720p</option>
                  </select>
                </div>
                <div>
                  <label class="label">Image (optional)</label>
                  <input id="image" class="input" type="file" accept="image/*" />
                </div>
              </div>
            </details>

            <details class="details">
              <summary class="summary">Frame</summary>

              <div class="row tight">
                <button id="btn-capture-frame" class="btn tiny ghost">Capture</button>
                <button id="btn-upscale-frame" class="btn tiny ghost">Upscale</button>
                <button id="btn-enhance-frame" class="btn tiny ghost">Enhance</button>
                <button id="btn-download-frame" class="btn tiny ghost">Download</button>
                <button id="btn-clear-frame" class="btn tiny ghost">Clear</button>
              </div>
              
              <div class="framePreviewRow">
                <img id="framePreview" class="framePreview" alt="Captured frame preview" />
                <div id="frameMeta" class="muted small"></div>
              </div>
            </details>

            <details class="details">
              <summary class="summary">Saved frames (selected job)</summary>
              <div class="muted small" id="frameHistoryMeta"></div>
              <div id="frameHistoryList" class="frameHistoryList"></div>
            </details>
          </div>

          <div class="panel promptDock">
            <label class="label">Prompt</label>
            <textarea id="prompt" class="textarea" placeholder="Describe the video..."></textarea>

            <div class="row">
              <button id="btn-generate" class="btn">Generate</button>
              <button id="btn-restyle" class="btn ghost">Restyle</button>
              <button id="btn-clear" class="btn ghost">Clear</button>
              <div id="hint" class="hint"></div>
            </div>

          </div>
        </div>
      </div>

      <div class="rightCol">
        <div class="stickyStack">
          <div id="playerWrap" class="playerWrap" style="display:none;">
            <video id="player" controls playsinline preload="metadata" class="player"></video>
          </div>

          <div class="panel compact">
            <div class="panelHead">
              <div class="label">Status</div>
              <div class="panelHeadRight">
                <button id="btn-clear-status" class="btn tiny ghost">Clear</button>
              </div>
            </div>
            <pre id="status" class="pre fixedPre">Idle.</pre>
            <div id="result" class="result"></div>
          </div>
        </div>
      </div>

      <div class="panel compact fullBleed">
        <div class="panelHead">
          <div class="label">Videos</div>
          <div class="panelHeadRight">
            <button id="btn-join" class="btn tiny ghost">Join selected</button>
          </div>
        </div>

        <div class="audioRow">
          <input id="audioFile" class="input" type="file" accept="audio/*" />
          <button id="btn-audio-replace" class="btn tiny ghost">Replace audio</button>
          <button id="btn-audio-mix" class="btn tiny ghost">Mix audio</button>
        </div>

        <div id="videoShelf" class="videoShelf"></div>
      </div>

      <div id="drawerOverlay" class="drawerOverlay" aria-hidden="true"></div>
      <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawerTop">
          <div>
            <div class="drawerTitle">History</div>
            <div class="drawerSubtitle muted small">Click a job to preview • Shift-select in shelf to join.</div>
          </div>
          <button id="btn-drawer-close" class="btn tiny ghost">Close</button>
        </div>
        <div class="drawerBody">
          <div class="drawerControls">
            <button id="btn-refresh-jobs" class="btn tiny ghost">Refresh statuses</button>
            <button id="btn-clear-jobs" class="btn tiny ghost">Clear history</button>
          </div>
          <div id="jobsList" class="jobsList"></div>
        </div>
      </aside>

      <div id="imgOverlay" class="imgOverlay" aria-hidden="true">
        <div class="imgOverlayPanel">
          <div class="imgOverlayTop">
            <div class="label">Frame preview</div>
            <div class="imgOverlayTopRight">
              <div class="muted small">Drag to select • Click outside selection to clear • Enter to crop</div>
              <button id="imgOverlayClose" class="btn tiny ghost">Close</button>
            </div>
          </div>

          <div id="imgOverlayStage" class="imgOverlayStage" tabindex="0" aria-label="Image crop stage">
            <img id="imgOverlayImg" class="imgOverlayImg" alt="Full size frame preview" />
            <div id="cropShade" class="cropShade" aria-hidden="true"></div>
            <div id="cropBox" class="cropBox" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      
    </section>
  </template>






  <script src="/static/app.js"></script>
</body>
</html>
